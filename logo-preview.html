<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Lancer Farms — Identity Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  :root{ color-scheme:dark;
    --paper:#2A2620; --ink:#F0EDE2; --ink-soft:#B0A99C; --line:#45423A;
    --green:#8FAF7E; --lg-line:var(--green); --lg-leaf-fill:var(--green); }
  .light{ --paper:#F5F1E6; --ink:#2A2620; --ink-soft:#6E675A; --line:#DDD6C6;
    --green:#3D5A3E; }
  *{box-sizing:border-box;}
  body{margin:0; background:#1D1A16; color:#F0EDE2; font-family:system-ui,sans-serif; padding:16px 12px 40px;}
  h1{font-family:'Fraunces',serif; font-weight:500; font-size:20px; margin:4px 4px 14px;}
  .stage{background:var(--paper); color:var(--ink); border:1px solid var(--line); border-radius:14px;
    padding:38px 16px 30px; margin-bottom:14px; text-align:center;}
  .emblem{display:inline-block;}
  .lockup .emblem svg{height:88px; width:auto;}
  .rule{width:150px; height:1px; background:var(--ink-soft); opacity:.5; margin:18px auto 14px;}
  .name{font-family:'Fraunces',serif; font-weight:500; font-size:26px; letter-spacing:5px; margin:0;}
  .sub{font-family:'Fraunces',serif; font-weight:400; font-size:13px; letter-spacing:7px; color:var(--ink); opacity:.9; margin-top:6px;}
  .loc{font-size:9.5px; letter-spacing:3.5px; color:var(--ink-soft); margin-top:16px;}
  .row{display:flex; align-items:flex-end; justify-content:center; gap:26px; margin-top:8px;}
  .cell{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .cell small{font-size:9px; letter-spacing:1px; color:var(--ink-soft);}
  .fav{width:44px; height:44px; border-radius:10px; background:var(--paper); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;}
  .fav svg{height:32px; width:auto;}
</style>
</head>
<body>
<h1>Lancer Farms — identity preview</h1>

<div class="stage lockup" id="dark-stage">
  <div class="emblem" data-emblem></div>
  <div class="rule"></div>
  <h2 class="name">LANCER FARMS</h2>
  <div class="sub">&amp; GARDENS</div>
  <div class="loc">RIVERSIDE · CALIFORNIA</div>
  <div class="row">
    <div class="cell"><span data-emblem data-h="56"></span><small>CARD</small></div>
    <div class="cell"><span data-emblem data-h="30"></span><small>TOPBAR</small></div>
    <div class="cell"><div class="fav"><span data-emblem></span></div><small>FAVICON</small></div>
  </div>
</div>

<div class="stage lockup light">
  <div class="emblem" data-emblem></div>
  <div class="rule"></div>
  <h2 class="name">LANCER FARMS</h2>
  <div class="sub">&amp; GARDENS</div>
  <div class="loc">RIVERSIDE · CALIFORNIA</div>
  <div class="row">
    <div class="cell"><span data-emblem data-h="56"></span><small>CARD</small></div>
    <div class="cell"><span data-emblem data-h="30"></span><small>TOPBAR</small></div>
    <div class="cell"><div class="fav"><span data-emblem></span></div><small>FAVICON</small></div>
  </div>
</div>

<script>
fetch('lfg-emblem.svg').then(r=>r.text()).then(svg=>{
  document.querySelectorAll('[data-emblem]').forEach(el=>{
    el.innerHTML = svg;
    const s = el.querySelector('svg');
    const h = el.dataset.h;
    if (h) { s.style.height = h+'px'; s.style.width='auto'; }
    else if (el.closest('.fav')) { s.style.height='32px'; s.style.width='auto'; }
  });
});
</script>
</body>
</html>
