<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>Almanac · Lancer Farms</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:dark;
  --bg:#2A2620; --card:#34302A; --border:#45423A; --border-s:#5A554A;
  --ink:#F0EDE2; --ink-soft:#B0A99C; --accent:#7E9A6E; --pale:#A8B89A; --warm:#C9973F;
  --font-head:'IM Fell English',Georgia,serif; --font-body:'Source Sans 3',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--ink);font-family:var(--font-body);
  max-width:560px;margin:0 auto;padding:18px 16px calc(90px + env(safe-area-inset-bottom));}
.head{text-align:center;margin-bottom:20px;}
h1{font-family:var(--font-head);font-size:2rem;font-weight:400;letter-spacing:.01em;}
.date{color:var(--ink-soft);font-size:.92rem;margin-top:4px;}
.hero{background:#2F4636;border:1px solid var(--border);border-radius:16px;
  padding:26px 20px;text-align:center;margin-bottom:16px;}
.temp{font-family:var(--font-head);font-size:3.6rem;line-height:1;}
.cond{font-size:1rem;color:var(--pale);margin-top:8px;line-height:1.4;}
.row{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px 18px;margin-bottom:9px;display:flex;justify-content:space-between;
  align-items:center;gap:14px;min-height:60px;}
.row .l{font-size:.95rem;color:var(--ink-soft);}
.row .v{font-size:1.05rem;font-weight:600;text-align:right;}
.sect{font-family:var(--font-head);font-size:1.3rem;margin:24px 0 10px;}
.note{color:var(--ink-soft);font-size:.88rem;line-height:1.55;margin-top:18px;text-align:center;}
.navbar{position:fixed;left:0;right:0;bottom:0;display:flex;gap:9px;
  background:#1E1B16;border-top:1.5px solid var(--border);
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));z-index:60;}
.navbar a{flex:1;min-height:56px;display:flex;align-items:center;justify-content:center;gap:7px;
  background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  color:var(--ink);text-decoration:none;font-size:1rem;font-weight:600;}
.navbar a:active{background:#3E5C42;border-color:var(--accent);}
</style>
</head>
<body>

<div class="head">
  <h1>Almanac</h1>
  <div class="date" id="today">—</div>
</div>

<div class="hero">
  <div class="temp" id="alm-temp">&hellip;</div>
  <div class="cond" id="alm-cond">Checking the sky&hellip;</div>
</div>

<div class="row"><span class="l">Wind</span><span class="v" id="alm-wind">—</span></div>
<div class="row"><span class="l">Sunrise</span><span class="v" id="alm-sunrise">—</span></div>
<div class="row"><span class="l">Sunset</span><span class="v" id="alm-sunset">—</span></div>
<div class="row"><span class="l">Daylight</span><span class="v" id="alm-daylight">—</span></div>
<div class="row"><span class="l">Moon</span><span class="v" id="alm-moon">—</span></div>

<div class="sect">The days ahead</div>
<div id="alm-forecast"></div>

<div class="note">Sun and moon are calculated for the farm. Weather comes from the National Weather Service.</div>

<div class="navbar">
  <a href="visitor.html">&#8249; Farm</a>
  <a href="data.html">Right now</a>
</div>

<script>
const FARM_LAT = 33.9281417, FARM_LNG = -117.4301472;
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtAlmTime(d){ return d ? d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '—'; }

function sunTimes(date){
  const rad=Math.PI/180, lat=FARM_LAT, lng=FARM_LNG;
  const doy=Math.floor((date-new Date(date.getFullYear(),0,0))/86400000);
  function calc(rising){
    const z=90.833, lh=lng/15, t=doy+((rising?6:18)-lh)/24, M=0.9856*t-3.289;
    let L=M+1.916*Math.sin(M*rad)+0.020*Math.sin(2*M*rad)+282.634;
    L=((L%360)+360)%360;
    let RA=Math.atan(0.91764*Math.tan(L*rad))/rad;
    RA=((RA%360)+360)%360;
    RA+=(Math.floor(L/90)*90-Math.floor(RA/90)*90); RA/=15;
    const sd=0.39782*Math.sin(L*rad), cd=Math.cos(Math.asin(sd));
    const ch=(Math.cos(z*rad)-(sd*Math.sin(lat*rad)))/(cd*Math.cos(lat*rad));
    if(ch>1||ch<-1) return null;
    let H=rising?360-Math.acos(ch)/rad:Math.acos(ch)/rad; H/=15;
    const T=H+RA-0.06571*t-6.622;
    let UT=((T-lh)%24+24)%24;
    const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
    d.setUTCMinutes(Math.round(UT*60)); return d;
  }
  return { sunrise:calc(true), sunset:calc(false) };
}
function moonPhase(date){
  const syn=29.53058867, known=Date.UTC(2000,0,6,18,14);
  let age=((date.getTime()-known)/86400000)%syn;
  if(age<0) age+=syn;
  const names=[[1.85,'\u{1F311} New Moon'],[5.54,'\u{1F312} Waxing Crescent'],[9.23,'\u{1F313} First Quarter'],
   [12.91,'\u{1F314} Waxing Gibbous'],[16.61,'\u{1F315} Full Moon'],[20.30,'\u{1F316} Waning Gibbous'],
   [23.99,'\u{1F317} Last Quarter'],[27.68,'\u{1F318} Waning Crescent'],[99,'\u{1F311} New Moon']];
  for(const p of names) if(age<p[0]) return p[1];
  return '\u{1F319}';
}

async function loadAlmanac(){
  const n=new Date();
  document.getElementById('today').textContent =
    n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const sun=sunTimes(n);
  document.getElementById('alm-sunrise').textContent=fmtAlmTime(sun.sunrise);
  document.getElementById('alm-sunset').textContent=fmtAlmTime(sun.sunset);
  if(sun.sunrise&&sun.sunset){
    let mins=Math.round((sun.sunset-sun.sunrise)/60000);
    if(mins<0) mins+=1440;
    document.getElementById('alm-daylight').textContent=Math.floor(mins/60)+'h '+(mins%60)+'m';
  }
  document.getElementById('alm-moon').textContent=moonPhase(n);
  try{
    let cached=null;
    try{ cached=JSON.parse(sessionStorage.getItem('lfg-wx')||'null'); }catch(e){}
    let periods;
    if(cached&&(Date.now()-cached.at)<1800000){ periods=cached.periods; }
    else{
      const pt=await (await fetch('https://api.weather.gov/points/'+FARM_LAT+','+FARM_LNG)).json();
      const fc=await (await fetch(pt.properties.forecast)).json();
      periods=fc.properties.periods.slice(0,5);
      try{ sessionStorage.setItem('lfg-wx',JSON.stringify({at:Date.now(),periods})); }catch(e){}
    }
    const p=periods[0];
    document.getElementById('alm-temp').textContent=p.temperature+'\u00b0'+p.temperatureUnit;
    document.getElementById('alm-cond').textContent=p.shortForecast+' \u00b7 '+p.name;
    document.getElementById('alm-wind').textContent=p.windSpeed+' '+p.windDirection;
    document.getElementById('alm-forecast').innerHTML=periods.slice(1).map(function(pd){
      return '<div class="row"><span class="l">'+esc(pd.name)+'</span><span class="v">'+
why(pd)+'</span></div>'; }).join('');
  }catch(e){
    document.getElementById('alm-temp').textContent='\u2014';
    document.getElementById('alm-cond').textContent='Weather unavailable right now';
  }
}
function why(pd){ return pd.temperature+'\u00b0'+pd.temperatureUnit+' \u00b7 '+esc(pd.shortForecast); }
loadAlmanac();
</script>
</body>
</html>
