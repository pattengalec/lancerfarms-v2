
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LFG Calendar — Lancer Farms</title>
<meta name="theme-color" content="#4F7355">
<link rel="icon" type="image/png" href="lfg-logo.png">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Source+Sans+3:wght@300;400;600&family=Courier+Prime&display=swap" rel="stylesheet">
<script>
(function(){try{
  var m = localStorage.getItem('lfg-mode');
  if (m === 'dark') document.documentElement.setAttribute('data-mode','dark');
}catch(e){}})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #F7F5F0;
  --surface:    #FFFFFF;
  --card:       #FFFFFF;
  --card-border:#E2DED4;
  --ink:        #2A2A28;
  --ink-soft:   #6B6760;
  --accent:     #4F7355;
  --on-accent:  #FAFAF7;
  --alert:      #B85C2A;
  --mist:       #ECE9E2;
  --border-w:   1.5px;
  --shadow:     0 2px 16px rgba(61,74,62,0.08);
  --radius:     10px;
  --font-head:  'IM Fell English', Georgia, serif;
  --font-body:  'Source Sans 3', sans-serif;
  --font-mono:  'Courier Prime', monospace;

  /* Task colors */
  --color-visit:    #4F7355;
  --color-weekly:   #2563eb;
  --color-onetime:  #d97706;
  --color-interval: #7c3aed;
  --color-seasonal: #6b7280;
}

[data-mode="dark"] {
  --bg:         #2E2E2E;
  --surface:    #262626;
  --card:       #383838;
  --card-border:#4A4A4A;
  --ink:        #F0EDE6;
  --ink-soft:   #A8A39A;
  --accent:     #6B8F71;
  --mist:       #3A3A3A;
}

html, body { background: var(--bg); color: var(--ink); font-family: var(--font-body); min-height: 100vh; }

/* ── HEADER ── */
.cal-header {
  background: var(--accent);
  color: var(--on-accent);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 50;
  border-bottom: 2px solid color-mix(in srgb, var(--accent) 100%, black 20%);
}
.cal-header-left { display: flex; align-items: center; gap: 10px; flex: 1; }
.cal-header img { width: 28px; height: 28px; object-fit: contain; }
.cal-header-title { font-family: var(--font-head); font-style: italic; font-size: 1.05rem; }
.cal-header-btns { display: flex; gap: 6px; align-items: center; }
.hdr-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: var(--on-accent);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 0.75rem;
  font-family: var(--font-mono);
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
}
.hdr-btn:active { opacity: 0.8; }

/* ── MONTH NAV ── */
.month-nav {
  background: var(--surface);
  border-bottom: var(--border-w) solid var(--card-border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 53px;
  z-index: 40;
}
.month-nav-title {
  font-family: var(--font-head);
  font-size: 1.1rem;
  color: var(--ink);
}
.month-nav-btn {
  background: none;
  border: var(--border-w) solid var(--card-border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 1rem;
  color: var(--ink-soft);
  cursor: pointer;
}
.month-nav-btn:active { background: var(--mist); }

/* ── CALENDAR GRID ── */
.cal-shell { max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

.day-labels {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--surface);
  border-bottom: var(--border-w) solid var(--card-border);
}
.day-label {
  text-align: center;
  padding: 6px 0;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
  opacity: 0.7;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--card-border);
}

.cal-cell {
  background: var(--bg);
  min-height: 70px;
  padding: 4px;
  cursor: pointer;
  position: relative;
  transition: background 150ms;
}
.cal-cell:active { background: var(--mist); }
.cal-cell.other-month { opacity: 0.35; }
.cal-cell.today { background: color-mix(in srgb, var(--accent) 8%, var(--bg)); }
.cal-cell.today .cal-date { background: var(--accent); color: var(--on-accent); border-radius: 50%; }
.cal-cell.has-tasks { background: var(--surface); }

.cal-date {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--ink-soft);
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 3px;
}

.task-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  padding: 0 2px;
}

.task-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.task-chip {
  font-size: 0.55rem;
  font-family: var(--font-mono);
  padding: 1px 4px;
  border-radius: 3px;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  margin-bottom: 1px;
  line-height: 1.4;
}

/* ── LEGEND ── */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: var(--border-w) solid var(--card-border);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.65rem;
  font-family: var(--font-mono);
  color: var(--ink-soft);
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── SHEET ── */
.sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; align-items:flex-end; justify-content:center; }
.sheet-overlay.open { display:flex; }
.sheet { background:var(--bg); border-radius:16px 16px 0 0; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; animation:slideUp 0.22s ease-out; padding-bottom:env(safe-area-inset-bottom); }
@keyframes slideUp { from { transform:translateY(60px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.sheet-handle { width:36px; height:4px; background:var(--card-border); border-radius:2px; margin:12px auto 0; }
.sheet-header { padding:14px 20px 0; display:flex; align-items:center; gap:8px; }
.sheet-header h2 { font-family:var(--font-head); font-size:1.1rem; flex:1; margin:0; }
.sheet-body { padding:14px 20px 28px; display:flex; flex-direction:column; gap:10px; }
.close-btn { background:none; border:none; color:var(--ink-soft); font-size:1.3rem; cursor:pointer; padding:4px 8px; }

/* ── TASK ITEMS IN SHEET ── */
.sheet-task {
  background: var(--card);
  border: var(--border-w) solid var(--card-border);
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  transition: transform 150ms;
}
.sheet-task:active { transform: scale(0.98); }
.sheet-task.completed { opacity: 0.5; }
.sheet-task.completed .task-title { text-decoration: line-through; }

.task-color-bar { width: 4px; border-radius: 2px; flex-shrink: 0; align-self: stretch; min-height: 20px; }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 0.88rem; font-weight: 600; color: var(--ink); }
.task-sub { font-size: 0.68rem; color: var(--ink-soft); margin-top: 2px; font-family: var(--font-mono); }
.task-done-badge { font-family: var(--font-mono); font-size: 0.6rem; background: var(--mist); color: var(--ink-soft); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }

/* ── TASK DETAIL ── */
.detail-section { background: var(--surface); border: var(--border-w) solid var(--card-border); border-radius: 10px; padding: 14px; }
.detail-label { font-family: var(--font-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); margin-bottom: 6px; }
.detail-text { font-size: 0.88rem; color: var(--ink); line-height: 1.65; white-space: pre-wrap; }

/* ── FORMS ── */
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); font-family: var(--font-mono); }
.form-group input, .form-group select, .form-group textarea {
  background: var(--bg);
  border: var(--border-w) solid var(--card-border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 0.92rem;
  font-family: inherit;
  color: var(--ink);
  outline: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { min-height: 80px; resize: vertical; }

.color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.color-opt {
  width: 28px; height: 28px; border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: transform 150ms;
}
.color-opt.selected { border-color: var(--ink); transform: scale(1.15); }

/* ── BUTTONS ── */
.btn-primary {
  background: linear-gradient(180deg, color-mix(in srgb,var(--accent) 100%,white 8%), var(--accent));
  color: var(--on-accent);
  border: 1px solid color-mix(in srgb,var(--accent) 100%,black 14%);
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 0.95rem;
  padding: 13px;
  width: 100%;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.10);
}
.btn-primary:active { opacity: 0.9; transform: scale(0.99); }

.btn-danger {
  background: var(--alert);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 0.88rem;
  padding: 10px;
  width: 100%;
  cursor: pointer;
}

.btn-ghost {
  background: none;
  border: var(--border-w) solid var(--card-border);
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 0.88rem;
  color: var(--ink-soft);
  padding: 10px;
  width: 100%;
  cursor: pointer;
}

.btn-text { background: none; border: none; color: var(--ink-soft); font-size: 0.88rem; font-family: var(--font-body); cursor: pointer; padding: 8px; width: 100%; }

.section-label { font-family: var(--font-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft); opacity: 0.7; }

/* ── ADMIN ADD BTN ── */
.add-task-fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--accent);
  color: var(--on-accent);
  border: none;
  border-radius: 50px;
  padding: 14px 20px;
  font-size: 0.88rem;
  font-family: var(--font-body);
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  display: none;
  align-items: center;
  gap: 6px;
  z-index: 30;
}
.add-task-fab.visible { display: flex; }

/* ── COMPLETE PROMPT ── */
.complete-prompt { background: var(--surface); border: var(--border-w) solid var(--card-border); border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }

/* ── TOAST ── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface); color:var(--ink); padding:10px 20px; border-radius:20px; font-size:0.82rem; font-family:var(--font-mono); transition:transform 0.3s ease; z-index:999; white-space:nowrap; border:var(--border-w) solid var(--card-border); box-shadow:0 4px 16px rgba(0,0,0,0.12); }
.toast.show { transform:translateX(-50%) translateY(0); }

.empty-block { text-align:center; padding:24px; color:var(--ink-soft); font-size:0.85rem; opacity:0.7; }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="cal-header">
  <div class="cal-header-left">
    <img src="lfg-logo.png" alt="LFG">
    <div class="cal-header-title">Farm Calendar</div>
  </div>
  <div class="cal-header-btns">
    <button class="hdr-btn" onclick="toggleMode()">☀</button>
    <a href="/app.html" class="hdr-btn">← App</a>
  </div>
</div>

<!-- ── MONTH NAV ── -->
<div class="month-nav">
  <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
  <div class="month-nav-title" id="month-title">—</div>
  <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
</div>

<!-- ── LEGEND ── -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--color-visit)"></div>Every visit</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--color-weekly)"></div>Weekly</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--color-onetime)"></div>One-time</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--color-interval)"></div>Interval</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--color-seasonal)"></div>Seasonal</div>
</div>

<div class="cal-shell">
  <!-- Day labels -->
  <div class="day-labels">
    <div class="day-label">Sun</div>
    <div class="day-label">Mon</div>
    <div class="day-label">Tue</div>
    <div class="day-label">Wed</div>
    <div class="day-label">Thu</div>
    <div class="day-label">Fri</div>
    <div class="day-label">Sat</div>
  </div>

  <!-- Calendar grid -->
  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- Admin add FAB -->
<button class="add-task-fab" id="add-task-fab" onclick="openAddTask()">+ Add Task</button>

<!-- ══ DAY SHEET ══ -->
<div class="sheet-overlay" id="day-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="day-sheet-title">Tasks</h2>
      <button class="close-btn" onclick="closeDaySheet()">✕</button>
    </div>
    <div class="sheet-body" id="day-sheet-body"></div>
  </div>
</div>

<!-- ══ TASK DETAIL SHEET ══ -->
<div class="sheet-overlay" id="task-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="close-btn" onclick="closeTaskSheet()">‹</button>
      <h2 id="task-sheet-title">Task</h2>
    </div>
    <div class="sheet-body" id="task-sheet-body"></div>
  </div>
</div>

<!-- ══ ADD/EDIT TASK SHEET ══ -->
<div class="sheet-overlay" id="edit-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="close-btn" onclick="closeEditSheet()">✕</button>
      <h2 id="edit-sheet-title">New Task</h2>
    </div>
    <div class="sheet-body">
      <input type="hidden" id="edit-task-id">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="edit-title" placeholder="e.g. Water all zones">
      </div>
      <div class="form-group">
        <label>Instructions</label>
        <textarea id="edit-instructions" placeholder="Step-by-step details…"></textarea>
      </div>
      <div class="form-group">
        <label>Schedule</label>
        <select id="edit-recurrence" onchange="toggleEditFields()">
          <option value="visit">Every visit (Mon & Fri)</option>
          <option value="weekly">Specific days of week</option>
          <option value="interval">Every N days</option>
          <option value="one_time">One-time (specific date)</option>
          <option value="seasonal">Seasonal (date range)</option>
        </select>
      </div>

      <!-- Weekly days -->
      <div id="edit-weekly-fields" style="display:none;" class="form-group">
        <label>Which days?</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          <label style="display:flex;align-items:center;gap:4px;font-size:0.82rem;"><input type="checkbox" value="Monday" class="day-cb"> Mon</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.82rem;"><input type="checkbox" value="Tuesday" class="day-cb"> Tue</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.82rem;"><input type="checkbox" value="Wednesday" class="day-cb"> Wed</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.82rem;"><input type="checkbox" value="Thursday" class="day-cb"> Thu</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.82rem;"><input type="checkbox" value="Friday" class="day-cb"> Fri</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.82rem;"><input type="checkbox" value="Saturday" class="day-cb"> Sat</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.82rem;"><input type="checkbox" value="Sunday" class="day-cb"> Sun</label>
        </div>
      </div>

      <!-- Interval -->
      <div id="edit-interval-fields" style="display:none;" class="form-group">
        <label>Every how many days?</label>
        <input type="number" id="edit-interval" placeholder="7" min="1">
      </div>

      <!-- One-time date -->
      <div id="edit-onetime-fields" style="display:none;" class="form-group">
        <label>Due date</label>
        <input type="date" id="edit-due-date">
      </div>

      <!-- Seasonal range -->
      <div id="edit-seasonal-fields" style="display:none;">
        <div class="form-group">
          <label>Season start</label>
          <input type="date" id="edit-season-start">
        </div>
        <div class="form-group">
          <label>Season end</label>
          <input type="date" id="edit-season-end">
        </div>
      </div>

      <div class="form-group">
        <label>Color</label>
        <div class="color-picker" id="color-picker">
          <div class="color-opt selected" style="background:var(--color-visit)" data-color="green" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:var(--color-weekly)" data-color="blue" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:var(--color-onetime)" data-color="orange" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:var(--color-interval)" data-color="purple" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:var(--color-seasonal)" data-color="gray" onclick="selectColor(this)"></div>
        </div>
      </div>

      <div class="form-group">
        <label>Sort Order <span style="font-weight:400;opacity:0.6;">(position in list)</span></label>
        <input type="number" id="edit-sort-order" placeholder="99" min="1">
      </div>

      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="edit-core" style="width:16px;height:16px;accent-color:var(--accent);">
        <label for="edit-core" style="font-size:0.85rem;">Core task (always shown)</label>
      </div>

      <button class="btn-primary" onclick="saveTask()">Save Task</button>
      <div id="edit-delete-section" style="display:none;">
        <div class="section-label" style="margin-bottom:8px;">Danger Zone</div>
        <button class="btn-danger" onclick="deleteTask('all')">Delete task permanently</button>
      </div>
      <button class="btn-text" onclick="closeEditSheet()">Cancel</button>
    </div>
  </div>
</div>

<!-- ══ COMPLETE PROMPT SHEET ══ -->
<div class="sheet-overlay" id="complete-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="close-btn" onclick="closeCompleteSheet()">✕</button>
      <h2>Mark Complete</h2>
    </div>
    <div class="sheet-body">
      <div class="complete-prompt">
        <div class="form-group">
          <label>Your name</label>
          <input type="text" id="complete-name" placeholder="First name">
        </div>
        <div class="form-group">
          <label>Note (optional)</label>
          <input type="text" id="complete-note" placeholder="Any observations…">
        </div>
        <button class="btn-primary" onclick="confirmComplete()">✓ Mark Complete</button>
        <button class="btn-text" onclick="closeCompleteSheet()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DB ─────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://muecvqxsqnhkhjrabtxh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11ZWN2cXhzcW5oa2hqcmFidHhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTU4MzAsImV4cCI6MjA5NjczMTgzMH0.7vOvhNxwtZ3xy1x67Vvq1BY_MsxN9J6ErkgaWklF7l4';
const DB = { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' };

async function sbGet(table, params) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params?'?'+params:''}`, { headers: DB });
  if (!res.ok) throw new Error(`GET ${table} ${res.status}`);
  return res.json();
}
async function sbPost(table, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, { method:'POST', headers:{...DB,Prefer:'return=representation'}, body:JSON.stringify(body) });
  if (!res.ok) throw new Error(`POST ${table} ${res.status}`);
  return res.json();
}
async function sbPatch(table, match, body) {
  const qs = Object.entries(match).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join('&');
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${qs}`, { method:'PATCH', headers:{...DB,Prefer:'return=representation'}, body:JSON.stringify(body) });
  if (!res.ok) throw new Error(`PATCH ${table} ${res.status}`);
  return res.json();
}

function today() { return new Date().toISOString().slice(0,10); }
function esc(s) { const d=document.createElement('div'); d.appendChild(document.createTextNode(String(s||''))); return d.innerHTML; }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
function fmtDate(iso) { if(!iso) return ''; try { return new Date(iso+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}); } catch(e){return iso;} }

// ── Auth ───────────────────────────────────────────────────────
const BASE_PW = 'Godisgood';
function isStaff() {
  const t = sessionStorage.getItem('lfg_token');
  return t && t.startsWith(BASE_PW) && /\d{4}$/.test(t);
}
function isAdmin() {
  return !!sessionStorage.getItem('lfg_admin_token');
}
function getStaffName() { return sessionStorage.getItem('lfg_name') || ''; }

// ── Mode ───────────────────────────────────────────────────────
window.toggleMode = function() {
  const html = document.documentElement;
  const dark = html.getAttribute('data-mode') === 'dark';
  dark ? html.removeAttribute('data-mode') : html.setAttribute('data-mode','dark');
  try { localStorage.setItem('lfg-mode', dark?'light':'dark'); } catch(e) {}
  updateModeBtn();
};
function updateModeBtn() {
  const dark = document.documentElement.getAttribute('data-mode') === 'dark';
  document.querySelectorAll('.hdr-btn[onclick="toggleMode()"]').forEach(b => b.textContent = dark?'🌙':'☀');
}

// ── Color map ──────────────────────────────────────────────────
const COLOR_MAP = {
  green:  'var(--color-visit)',
  blue:   'var(--color-weekly)',
  orange: 'var(--color-onetime)',
  purple: 'var(--color-interval)',
  gray:   'var(--color-seasonal)',
};

function taskColor(task) {
  if (task.color && COLOR_MAP[task.color]) return COLOR_MAP[task.color];
  switch(task.recurrence_type) {
    case 'visit':    return 'var(--color-visit)';
    case 'weekly':
    case 'biweekly': return 'var(--color-weekly)';
    case 'one_time': return 'var(--color-onetime)';
    case 'interval': return 'var(--color-interval)';
    case 'seasonal': return 'var(--color-seasonal)';
    default:         return 'var(--color-visit)';
  }
}

// ── Calendar state ─────────────────────────────────────────────
let currentYear, currentMonth;
let allTasks = [];
let completedToday = new Set();
let selectedDate = null;
let selectedTask = null;

// ── Month navigation ───────────────────────────────────────────
window.changeMonth = function(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
};

// ── Task visibility for a given date ──────────────────────────
function getTasksForDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
  const visitDays = ['Monday','Friday'];

  return allTasks.filter(task => {
    switch(task.recurrence_type) {
      case 'visit':
        return visitDays.includes(dayName);
      case 'weekly':
      case 'biweekly':
        return (task.recurrence_days||[]).includes(dayName);
      case 'interval': {
        if (!task.created_at) return false;
        const start = new Date(task.created_at).setHours(0,0,0,0);
        const current = d.setHours(0,0,0,0);
        const diff = Math.floor((current - start) / 86400000);
        return diff >= 0 && diff % (task.recurrence_interval||1) === 0;
      }
      case 'one_time':
        return task.due_date === dateStr;
      case 'seasonal':
        return task.season_start <= dateStr && task.season_end >= dateStr;
      default:
        return false;
    }
  });
}

// ── Render calendar ────────────────────────────────────────────
function renderCalendar() {
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('month-title').textContent = monthNames[currentMonth] + ' ' + currentYear;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();
  const todayStr = today();

  // Fill prev month days
  for (let i = firstDay - 1; i >= 0; i--) {
    const day = daysInPrev - i;
    const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    grid.appendChild(makeCell(day, dateStr, true));
  }

  // Current month days
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const cell = makeCell(day, dateStr, false);
    if (dateStr === todayStr) cell.classList.add('today');
    grid.appendChild(cell);
  }

  // Fill next month days
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  let nextDay = 1;
  for (let i = firstDay + daysInMonth; i < totalCells; i++) {
    const month = currentMonth + 2;
    const dateStr = `${currentYear}-${String(month).padStart(2,'0')}-${String(nextDay).padStart(2,'0')}`;
    grid.appendChild(makeCell(nextDay, dateStr, true));
    nextDay++;
  }
}

function makeCell(day, dateStr, otherMonth) {
  const tasks = getTasksForDate(dateStr);
  const cell = document.createElement('div');
  cell.className = 'cal-cell' + (otherMonth?' other-month':'') + (tasks.length?' has-tasks':'');
  cell.onclick = () => openDaySheet(dateStr);

  const dateEl = document.createElement('div');
  dateEl.className = 'cal-date';
  dateEl.textContent = day;
  cell.appendChild(dateEl);

  if (tasks.length) {
    const dotsEl = document.createElement('div');
    dotsEl.className = 'task-dots';
    tasks.slice(0,4).forEach(task => {
      const dot = document.createElement('div');
      dot.className = 'task-dot';
      dot.style.background = taskColor(task);
      dotsEl.appendChild(dot);
    });
    if (tasks.length > 4) {
      const more = document.createElement('div');
      more.style.cssText = `font-size:0.5rem;color:var(--ink-soft);font-family:var(--font-mono);`;
      more.textContent = '+' + (tasks.length - 4);
      dotsEl.appendChild(more);
    }
    cell.appendChild(dotsEl);
  }

  return cell;
}

// ── Day sheet ─────────────────────────────────────────────────
function openDaySheet(dateStr) {
  selectedDate = dateStr;
  const tasks = getTasksForDate(dateStr);
  document.getElementById('day-sheet-title').textContent = fmtDate(dateStr);

  const body = document.getElementById('day-sheet-body');

  if (!tasks.length) {
    body.innerHTML = '<div class="empty-block">No tasks scheduled for this day.</div>';
    if (isAdmin()) {
      body.innerHTML += `<button class="btn-primary" style="margin-top:12px;" onclick="openAddTask('${dateStr}')">+ Add Task</button>`;
    }
  } else {
    body.innerHTML = tasks.map(task => {
      const done = completedToday.has(task.id) && dateStr === today();
      return `<div class="sheet-task ${done?'completed':''}" onclick="openTaskDetail('${task.id}','${dateStr}')">
        <div class="task-color-bar" style="background:${taskColor(task)}"></div>
        <div class="task-body">
          <div class="task-title">${esc(task.title)}</div>
          <div class="task-sub">${scheduleLabel(task)}</div>
        </div>
        ${done ? '<div class="task-done-badge">✓ Done</div>' : ''}
      </div>`;
    }).join('');

    if (isAdmin()) {
      body.innerHTML += `<button class="btn-ghost" style="margin-top:4px;" onclick="openAddTask('${dateStr}')">+ Add Task</button>`;
    }
  }

  document.getElementById('day-sheet').classList.add('open');
}

window.closeDaySheet = function() {
  document.getElementById('day-sheet').classList.remove('open');
};

// ── Task detail ───────────────────────────────────────────────
function openTaskDetail(taskId, dateStr) {
  const task = allTasks.find(t => t.id === taskId);
  if (!task) return;
  selectedTask = task;
  selectedDate = dateStr;

  document.getElementById('task-sheet-title').textContent = task.title;

  const done = completedToday.has(taskId) && dateStr === today();
  const isToday = dateStr === today();

  let html = '';

  if (task.instructions) {
    html += `<div class="detail-section">
      <div class="detail-label">Instructions</div>
      <div class="detail-text">${esc(task.instructions)}</div>
    </div>`;
  }

  html += `<div class="detail-section">
    <div class="detail-label">Schedule</div>
    <div class="detail-text">${scheduleLabel(task)}</div>
  </div>`;

  if (isToday && !done) {
    html += `<button class="btn-primary" onclick="promptComplete()">Mark Complete</button>`;
  } else if (done) {
    html += `<div style="text-align:center;padding:12px;font-family:var(--font-mono);font-size:0.8rem;color:var(--accent);">✓ Completed today</div>`;
  }

  if (isAdmin()) {
    html += `<div class="section-label" style="margin-top:8px;">Admin</div>
    <button class="btn-ghost" onclick="openEditTask('${taskId}')">Edit Task</button>`;
  }

  document.getElementById('task-sheet-body').innerHTML = html;
  document.getElementById('task-sheet').classList.add('open');
}

window.closeTaskSheet = function() {
  document.getElementById('task-sheet').classList.remove('open');
};

// ── Complete ──────────────────────────────────────────────────
function promptComplete() {
  document.getElementById('complete-name').value = getStaffName();
  document.getElementById('complete-note').value = '';
  document.getElementById('complete-sheet').classList.add('open');
}

window.closeCompleteSheet = function() {
  document.getElementById('complete-sheet').classList.remove('open');
};

window.confirmComplete = async function() {
  const name = document.getElementById('complete-name').value.trim();
  if (!name) { showToast('Enter your name'); return; }
  const note = document.getElementById('complete-note').value.trim();
  showToast('Logging…');
  try {
    await sbPost('lfg_task_completions', {
      task_id: selectedTask.id,
      completed_by: name,
      visit_date: today(),
      notes: note || null
    });
    completedToday.add(selectedTask.id);
    showToast('Task complete — thanks ' + name + '!');
    closeCompleteSheet();
    closeTaskSheet();
    // Refresh day sheet
    openDaySheet(selectedDate);
    renderCalendar();
  } catch(e) { showToast('Could not log — check connection'); }
};

// ── Add/Edit task ──────────────────────────────────────────────
let editingTaskId = null;
let selectedColor = 'green';

window.openAddTask = function(dateStr) {
  editingTaskId = null;
  selectedColor = 'green';
  document.getElementById('edit-sheet-title').textContent = 'New Task';
  document.getElementById('edit-task-id').value = '';
  document.getElementById('edit-title').value = '';
  document.getElementById('edit-instructions').value = '';
  document.getElementById('edit-recurrence').value = 'visit';
  document.getElementById('edit-interval').value = '';
  document.getElementById('edit-due-date').value = dateStr || today();
  document.getElementById('edit-season-start').value = '';
  document.getElementById('edit-season-end').value = '';
  document.getElementById('edit-sort-order').value = '99';
  document.getElementById('edit-core').checked = false;
  document.getElementById('edit-delete-section').style.display = 'none';
  document.querySelectorAll('.day-cb').forEach(cb => cb.checked = false);
  document.querySelectorAll('.color-opt').forEach(el => {
    el.classList.toggle('selected', el.dataset.color === 'green');
  });
  toggleEditFields();
  document.getElementById('edit-sheet').classList.add('open');
};

window.openEditTask = function(taskId) {
  const task = allTasks.find(t => t.id === taskId);
  if (!task) return;
  editingTaskId = taskId;
  selectedColor = task.color || 'green';

  document.getElementById('edit-sheet-title').textContent = 'Edit Task';
  document.getElementById('edit-task-id').value = taskId;
  document.getElementById('edit-title').value = task.title || '';
  document.getElementById('edit-instructions').value = task.instructions || '';
  document.getElementById('edit-recurrence').value = task.recurrence_type || 'visit';
  document.getElementById('edit-interval').value = task.recurrence_interval || '';
  document.getElementById('edit-due-date').value = task.due_date || today();
  document.getElementById('edit-season-start').value = task.season_start || '';
  document.getElementById('edit-season-end').value = task.season_end || '';
  document.getElementById('edit-sort-order').value = task.sort_order || 99;
  document.getElementById('edit-core').checked = !!task.is_core;
  document.getElementById('edit-delete-section').style.display = '';

  // Set day checkboxes
  document.querySelectorAll('.day-cb').forEach(cb => {
    cb.checked = (task.recurrence_days||[]).includes(cb.value);
  });

  // Set color
  document.querySelectorAll('.color-opt').forEach(el => {
    el.classList.toggle('selected', el.dataset.color === selectedColor);
  });

  toggleEditFields();
  document.getElementById('edit-sheet').classList.add('open');
};

window.closeEditSheet = function() {
  document.getElementById('edit-sheet').classList.remove('open');
};

window.toggleEditFields = function() {
  const type = document.getElementById('edit-recurrence').value;
  document.getElementById('edit-weekly-fields').style.display   = type === 'weekly' ? '' : 'none';
  document.getElementById('edit-interval-fields').style.display = type === 'interval' ? '' : 'none';
  document.getElementById('edit-onetime-fields').style.display  = type === 'one_time' ? '' : 'none';
  document.getElementById('edit-seasonal-fields').style.display = type === 'seasonal' ? '' : 'none';
};

window.selectColor = function(el) {
  selectedColor = el.dataset.color;
  document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
};

window.saveTask = async function() {
  const title = document.getElementById('edit-title').value.trim();
  if (!title) { showToast('Title required'); return; }
  const type = document.getElementById('edit-recurrence').value;

  let recurrence_days = null;
  if (type === 'weekly') {
    recurrence_days = [...document.querySelectorAll('.day-cb:checked')].map(cb => cb.value);
    if (!recurrence_days.length) { showToast('Select at least one day'); return; }
  }

  const fields = {
    title,
    instructions: document.getElementById('edit-instructions').value.trim() || null,
    recurrence_type: type,
    recurrence_days: recurrence_days,
    recurrence_interval: type === 'interval' ? parseInt(document.getElementById('edit-interval').value)||null : null,
    due_date: type === 'one_time' ? document.getElementById('edit-due-date').value || null : null,
    season_start: type === 'seasonal' ? document.getElementById('edit-season-start').value || null : null,
    season_end: type === 'seasonal' ? document.getElementById('edit-season-end').value || null : null,
    is_core: document.getElementById('edit-core').checked,
    sort_order: parseInt(document.getElementById('edit-sort-order').value) || 99,
    color: selectedColor,
    created_by: 'Admin'
  };

  showToast('Saving…');
  try {
    if (editingTaskId) {
      await sbPatch('lfg_tasks', { id: editingTaskId }, fields);
      showToast('Task updated!');
    } else {
      await sbPost('lfg_tasks', fields);
      showToast('Task added!');
    }
    closeEditSheet();
    await loadTasks();
    renderCalendar();
  } catch(e) { showToast('Could not save'); console.error(e); }
};

window.deleteTask = async function(scope) {
  if (!editingTaskId) return;
  showToast('Deleting…');
  try {
    await sbPatch('lfg_tasks', { id: editingTaskId }, { archived_at: new Date().toISOString() });
    showToast('Task deleted');
    closeEditSheet();
    await loadTasks();
    renderCalendar();
  } catch(e) { showToast('Could not delete'); console.error(e); }
};

// ── Schedule label ────────────────────────────────────────────
function scheduleLabel(task) {
  switch(task.recurrence_type) {
    case 'visit':    return 'Every visit (Mon & Fri)';
    case 'weekly':   return 'Weekly · ' + (task.recurrence_days||[]).join(', ');
    case 'biweekly': return (task.recurrence_days||[]).join(' & ');
    case 'interval': return 'Every ' + task.recurrence_interval + ' days';
    case 'one_time': return task.due_date ? 'Due ' + fmtDate(task.due_date) : 'One-time';
    case 'seasonal': return 'Seasonal';
    default:         return '';
  }
}

// ── Load data ─────────────────────────────────────────────────
async function loadTasks() {
  allTasks = await sbGet('lfg_tasks', 'archived_at=is.null&order=sort_order.asc,priority.asc,created_at.asc');
}

async function loadCompletions() {
  const rows = await sbGet('lfg_task_completions', `visit_date=eq.${today()}`);
  completedToday = new Set(rows.map(r => r.task_id));
}

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  updateModeBtn();

  const now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth();

  // Check admin
  const adminToken = sessionStorage.getItem('lfg_admin_token');
  if (adminToken) {
    document.getElementById('add-task-fab').classList.add('visible');
  }

  // If not staff or admin, redirect to login
  if (!isStaff() && !isAdmin()) {
    window.location.href = '/app.html';
    return;
  }

  await Promise.all([loadTasks(), loadCompletions()]);
  renderCalendar();
});
</script>
