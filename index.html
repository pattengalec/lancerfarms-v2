<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lancer Farms · managed by grush</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Source+Sans+3:wght@300;400;600;700&family=Yellowtail&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#23262B; --ink-soft:#5F5A52; --paper:#F2EFE8; --card:#FBFAF6;
    --line:#E4DFD3; --line-strong:#C9C2B4;
    --green:#8F2228; --green-d:#23262B; --leaf:#B4A71D;
    --amber:#B4A71D;
    --shadow:0 1px 0 rgba(32,38,28,.04), 0 2px 8px rgba(32,38,28,.06);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    font-family:'Source Sans 3',system-ui,sans-serif; color:var(--ink);
    background:var(--paper); overscroll-behavior:none; -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Fraunces',Georgia,serif; font-weight:600; margin:0;}
  button{font-family:inherit; cursor:pointer;}

  /* ---------- splash ---------- */
  #splash{position:fixed; inset:0; background:var(--green-d); display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:200; transition:opacity .6s ease; color:#f4f1e8;}
  #splash.gone{opacity:0; pointer-events:none;}
  #splash .mark{width:100px; height:100px; border-radius:26px; background:#f4f1e8; display:flex;
    align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:600;
    font-size:56px; color:var(--green); box-shadow:0 8px 30px rgba(0,0,0,.3);
    animation:pop .6s cubic-bezier(.2,.9,.3,1.4);}
  #splash .wm{margin-top:22px; font-family:'Fraunces',serif; font-size:24px; letter-spacing:.5px; opacity:0; animation:fadein .7s ease .35s forwards; text-align:center;}
  #splash .wm small{display:block; font-family:'Source Sans 3'; font-size:12px; letter-spacing:4px; text-transform:uppercase; opacity:.65; margin-top:6px;}
  @keyframes pop{0%{transform:scale(.4); opacity:0;}100%{transform:scale(1); opacity:1;}}
  @keyframes fadein{to{opacity:1;}}

  /* ---------- hero (role fork) ---------- */
  #hero{position:fixed; inset:0; background:var(--paper); z-index:150; display:none;
    flex-direction:column; align-items:center; justify-content:center; padding:32px; text-align:center;}
  #hero.show{display:flex; animation:fadein .5s ease;}
  #hero .mark{width:76px; height:76px; border-radius:20px; background:var(--green); color:#f4f1e8;
    display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:600; font-size:40px;}
  #hero h1{font-size:32px; margin:16px 0 2px;}
  #hero .sub{color:var(--ink-soft); margin:0 0 40px; font-size:15px; letter-spacing:2px; text-transform:uppercase;}
  .role-btn{width:100%; max-width:360px; min-height:82px; border-radius:20px; border:none;
    display:flex; align-items:center; gap:18px; padding:0 24px; margin-bottom:16px; box-shadow:var(--shadow);
    font-size:21px; font-weight:600; text-align:left; transition:transform .1s;}
  .role-btn:active{transform:scale(.98);}
  .role-btn .ic{font-size:34px; flex:0 0 auto;}
  .role-btn small{display:block; font-weight:400; font-size:13px; opacity:.8; margin-top:3px;}
  .role-staff{background:var(--green); color:#fff;}
  .role-visitor{background:var(--card); color:var(--ink); border:1.5px solid var(--line-strong);}
  .langrow{margin-top:24px; display:flex; gap:8px;}
  .lang-pill{border:1.5px solid var(--line-strong); background:var(--card); color:var(--ink-soft);
    border-radius:999px; padding:9px 18px; font-size:14px; font-weight:600;}
  .lang-pill.on{background:var(--green-d); color:#fff; border-color:var(--green-d);}
  .tiny{margin-top:22px; font-size:12px; color:var(--ink-soft); opacity:.7;}
  .mbg{display:block; font-family:Georgia,serif; font-style:italic; font-size:12px;
    letter-spacing:0; text-transform:none; opacity:.85; margin-top:10px;}
  .grush-sig{font-family:'Yellowtail',cursive; font-style:normal; font-size:20px; line-height:1;}
  #splash .grush-sig{color:#C34044;}
  #hero .grush-sig{color:var(--green);}
</style>
</head>
<body>

<div id="splash">
  <div class="mark">L</div>
  <div class="wm">Lancer Farms<span class="mbg">managed by <span class="grush-sig">grush</span></span></div>
</div>

<div id="hero">
  <div class="mark">L</div>
  <h1>Lancer Farms</h1>
  <div class="sub"><span class="mbg" style="margin-top:2px">managed by <span class="grush-sig">grush</span></span></div>
  <button class="role-btn role-staff" onclick="chooseRole('staff')">
    <span class="ic">&#127793;</span>
    <span>Staff<small>Log work, tasks &amp; supplies</small></span>
  </button>
  <button class="role-btn role-visitor" onclick="chooseRole('visitor')">
    <span class="ic">&#128065;</span>
    <span>Visitor<small>Explore the farm</small></span>
  </button>
  <div class="langrow">
    <button class="lang-pill" data-lang="en" onclick="setLang('en',this)">English</button>
    <button class="lang-pill" data-lang="es" onclick="setLang('es',this)">Espa&ntilde;ol</button>
    <button class="lang-pill" data-lang="pt" onclick="setLang('pt',this)">Portugu&ecirc;s</button>
  </div>
  <div class="tiny">Tap to choose &mdash; we&rsquo;ll remember next time.</div>
</div>

<script>
/* Sticky role fork + remembered language. Splash → hero (or skip straight in if role remembered). */
window.addEventListener('load', function(){
  // set language pill highlight from stored pref (default en)
  var lang = localStorage.getItem('lfg_lang') || 'en';
  var pill = document.querySelector('.lang-pill[data-lang="'+lang+'"]');
  if(pill) pill.classList.add('on');

  var role = localStorage.getItem('lfg_role');
  setTimeout(function(){
    document.getElementById('splash').classList.add('gone');
    if(role === 'staff'){ go('/app.html'); }
    else if(role === 'visitor'){ go('/visitor.html'); }
    else { document.getElementById('hero').classList.add('show'); }
  }, 1400);
});

function setLang(l, el){
  localStorage.setItem('lfg_lang', l);
  document.querySelectorAll('.lang-pill').forEach(function(p){ p.classList.remove('on'); });
  if(el) el.classList.add('on');
}

function chooseRole(r){
  localStorage.setItem('lfg_role', r);
  if(r === 'staff'){ go('/app.html'); }
  else { go('/visitor.html'); }
}

function go(url){ window.location.href = url; }
</script>
</body>
</html>
